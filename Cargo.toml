[package]
name = "simple-music-synthesizer"
version = "0.1.0"
edition = "2024"
license = "MIT"
include = ["LICENSE", "**/*.rs", "Cargo.toml"]


[dependencies]
eframe = { version = "0.34.3", features = ["glow", "ron", "serde"] }
rodio = { version = "0.22.2", features = ["playback"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
env_logger = "0.11.8"

[profile.release]
opt-level = 2
